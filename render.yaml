services:
  - type: web
    name: leafcare-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_NAME
        value: LeafCare AI
      - key: YOLO_MODEL_PATH
        value: moduleyolola/best.pt
      - key: CNN_MODEL_PATH
        value: model_0.h5
      - key: CNN_LABELS_PATH
        value: config/cnn_labels.json
      - key: YOLO_CONF_THRESHOLD
        value: "0.25"
      - key: CROP_PADDING_RATIO
        value: "0.08"
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: ALLOWED_EXTENSIONS
        value: jpg,jpeg,png,webp
      - key: CNN_PREPROCESS_MODE
        value: efficientnet
      - key: USE_YOLO
        value: "0"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_ORIGIN
        value: https://leafcare-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: leafcare-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: echo "No build step"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
